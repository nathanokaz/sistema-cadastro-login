<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{css/global.css}">
    <link rel="stylesheet" th:href="@{css/register-style.css}">
    <title>DevLink - Register</title>
</head>
<body>

<div class="container">

    <div class="page-title">
        <h1> <img th:src="@{/assets/logo-devlink.png}" width="40px" height="30px"> DevLink</h1>
        <h2>Crie sua conta de desenvolvedor<br> e compartilhe seus projetos com o mundo.</h2>
    </div>

    <div class="register-form">
        <form method="POST" id="register-form" action="#" th:action="@{/register}">
            <div class="input-group">
                <label for="name-input" id="label-name">Nome Completo</label>
                <input type="text" name="name" id="name-input" placeholder="Nome Completo">
                <span class="errorMessage" id="error-name"></span>
            </div>

            <div class="input-group">
                <label for="nickname-input" id="label-username">Username</label>
                <input type="text" name="nickname" id="nickname-input" placeholder="Ex: nome123">
                <span class="errorMessage" id="error-username"></span>
                <span class="errorMessage" th:if="${errorNick}" th:text="${errorNick}"></span>
            </div>

            <div class="input-group">
                <label for="email-input" id="label-email">Email</label>
                <input type="email" name="email" id="email-input" placeholder="Ex: nome@email.com">
                <span class="errorMessage" id="error-email"></span>
                <span class="errorMessage" th:if="${errorEmail}" th:text="${errorEmail}"></span>
            </div>

            <div class="input-group">
                <label for="password-input" id="label-password">Senha</label>
                <input type="password" name="password" id="password-input" placeholder="Senha">
                <span class="errorMessage" id="error-password"></span>
            </div>

            <div class="register-button">
                <button type="submit" id="register-button">Registrar</button>
            </div>

            <div class="register-span">
                <span>Já tem uma conta? <a th:href="@{/login}" id="login-now">Entre agora</a></span>
            </div>
        </form>
    </div>

</div>

<script th:src="@{js/register-script.js}"></script>
</body>
</html>
