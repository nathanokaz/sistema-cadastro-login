<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/global.css}">
    <link rel="stylesheet" th:href="@{/css/login-style.css}">
    <title>DevLink - Login</title>
</head>
<body>

<div class="container">

    <div class="page-title">
        <h1> <img th:src="@{/assets/logo-devlink.png}" width="40px" height="30px"> DevLink</h1>
        <h2>Bem vindo de volta!<br> Por favor, faça login na sua conta.</h2>
    </div>

    <div class="login-form">
        <form method="POST" th:action="@{/login}" action="#" id="login-form">
            <div class="input-group">
                <label for="email-input" id="label-email">Email</label>
                <input type="email" name="email" id="email-input" placeholder="Ex: nome@email.com">
                <span class="errorMessage" id="error-email"></span>
            </div>

            <div class="input-group">
                <label for="password-input" id="label-password">Senha</label>
                <input type="password" name="password" id="password-input" placeholder="Senha">
                <span class="errorMessage" id="error-password"></span>
            </div>

            <span class="errorMessage" th:if="${loginError}" th:text="${loginError}"></span>

            <label id="remember-me-label" for="remember-me-checkbox">Lembrar de mim
                <input type="checkbox" name="remember-me" id="remember-me-checkbox"  >
            </label>

            <div class="login-button">
                <button type="submit" id="login-button">Entrar</button>
            </div>

            <div class="register-span">
                <span>Ainda não tem uma conta? <a th:href="@{/register}" id="register-now">Cadastre-se já</a></span>
            </div>
        </form>
    </div>

</div>

<script th:src="@{/js/login-script.js}"></script>

</body>
</html>
